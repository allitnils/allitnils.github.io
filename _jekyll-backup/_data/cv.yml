      institution: Australian Institute of Business
      year: 2025
      description:
        - "Thesis: Space Between Spaces: Rituals, Liminality, and the Dynamics of Remote Work Intensity"
        - Quantitative study using structural equation modelling (SEM) and confirmatory factor analysis (CFA) to validate novel constructs — Liminal Spaces, Remote Work Intensity, Technostress, Work–Life Balance, Well-being, Productivity, Creativity, and Innovation.
        - Central contribution is the theorisation and empirical validation of liminal spaces as a mediating mechanism between remote work intensity and employee outcomes.
