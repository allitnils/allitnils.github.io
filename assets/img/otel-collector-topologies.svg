<svg width="1100" height="580" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Segoe UI', Arial, sans-serif; background: #FAFAFA;">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4B5563"/>
    </marker>
    <marker id="arr-dashed" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4B5563"/>
    </marker>
  </defs>

  <!-- ===== SIDECAR PATTERN ===== -->
  <rect x="15" y="15" width="320" height="530" rx="10" fill="#EFF6FF" stroke="#2563EB" stroke-width="2"/>
  <rect x="15" y="15" width="320" height="42" rx="10" fill="#2563EB"/>
  <rect x="15" y="45" width="320" height="12" fill="#2563EB"/>
  <text x="175" y="43" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">Sidecar Pattern</text>

  <!-- Pod boundary -->
  <rect x="35" y="75" width="280" height="170" rx="6" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1.2" stroke-dasharray="6,4"/>
  <text x="48" y="94" font-size="10" fill="#9CA3AF" font-style="italic">App Pod</text>

  <!-- Service -->
  <rect x="45" y="105" width="110" height="65" rx="5" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
  <text x="100" y="137" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">Service</text>
  <text x="100" y="153" text-anchor="middle" font-size="10" fill="#6B7280">(app code)</text>

  <!-- OTel Collector sidecar -->
  <rect x="185" y="105" width="120" height="65" rx="5" fill="#1D4ED8"/>
  <text x="245" y="134" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">OTel Collector</text>
  <text x="245" y="150" text-anchor="middle" font-size="10" fill="#BFDBFE">(sidecar)</text>

  <!-- Arrow: Service -> OTel -->
  <line x1="155" y1="137" x2="183" y2="137" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="169" y="130" text-anchor="middle" font-size="9" fill="#6B7280">OTLP/gRPC</text>

  <!-- Pod count note -->
  <rect x="35" y="265" width="280" height="60" rx="5" fill="#DBEAFE" stroke="none"/>
  <text x="175" y="287" text-anchor="middle" font-size="10" fill="#1E40AF">Memory: 128 MiB x pod count</text>
  <text x="175" y="303" text-anchor="middle" font-size="10" fill="#1E40AF">Blast radius: single pod</text>
  <text x="175" y="319" text-anchor="middle" font-size="10" fill="#1E40AF">Tail sampling: not supported</text>

  <!-- Observability Backend -->
  <rect x="70" y="440" width="180" height="60" rx="5" fill="#059669"/>
  <text x="160" y="468" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">Observability Backend</text>
  <text x="160" y="485" text-anchor="middle" font-size="10" fill="#D1FAE5">vendor / self-hosted</text>

  <!-- Arrow: OTel -> Backend (routed) -->
  <path d="M 245 170 L 245 410 L 205 440" stroke="#4B5563" stroke-width="1.5" fill="none" marker-end="url(#arr)" stroke-dasharray="5,3"/>


  <!-- ===== DAEMONSET PATTERN ===== -->
  <rect x="355" y="15" width="380" height="530" rx="10" fill="#FAF5FF" stroke="#7C3AED" stroke-width="2"/>
  <rect x="355" y="15" width="380" height="42" rx="10" fill="#7C3AED"/>
  <rect x="355" y="45" width="380" height="12" fill="#7C3AED"/>
  <text x="545" y="43" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">DaemonSet Pattern</text>

  <!-- Node boundary -->
  <rect x="372" y="75" width="346" height="170" rx="6" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1.2" stroke-dasharray="6,4"/>
  <text x="386" y="94" font-size="10" fill="#9CA3AF" font-style="italic">K8s Node</text>

  <!-- App 1, 2, 3 -->
  <rect x="382" y="105" width="88" height="65" rx="5" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
  <text x="426" y="137" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">App 1</text>
  <rect x="500" y="105" width="88" height="65" rx="5" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
  <text x="544" y="137" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">App 2</text>
  <rect x="618" y="105" width="88" height="65" rx="5" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
  <text x="662" y="137" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">App 3</text>

  <!-- OTel DaemonSet collector -->
  <rect x="450" y="285" width="190" height="65" rx="5" fill="#1D4ED8"/>
  <text x="545" y="313" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">OTel DaemonSet</text>
  <text x="545" y="330" text-anchor="middle" font-size="10" fill="#BFDBFE">(per-node collector)</text>

  <!-- Arrows: Apps -> DaemonSet -->
  <line x1="426" y1="170" x2="490" y2="285" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="544" y1="170" x2="540" y2="283" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="662" y1="170" x2="598" y2="283" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Note box -->
  <rect x="372" y="370" width="346" height="60" rx="5" fill="#EDE9FE" stroke="none"/>
  <text x="545" y="392" text-anchor="middle" font-size="10" fill="#4C1D95">Memory: 128 MiB x node count</text>
  <text x="545" y="408" text-anchor="middle" font-size="10" fill="#4C1D95">Blast radius: all pods on node (node crash)</text>
  <text x="545" y="424" text-anchor="middle" font-size="10" fill="#4C1D95">Tail sampling: not supported</text>

  <!-- Backend -->
  <rect x="460" y="450" width="175" height="60" rx="5" fill="#059669"/>
  <text x="547" y="478" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">Observability Backend</text>
  <text x="547" y="495" text-anchor="middle" font-size="10" fill="#D1FAE5">vendor / self-hosted</text>

  <line x1="545" y1="350" x2="545" y2="448" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="5,3"/>


  <!-- ===== GATEWAY PATTERN ===== -->
  <rect x="755" y="15" width="330" height="530" rx="10" fill="#F0FDF4" stroke="#059669" stroke-width="2"/>
  <rect x="755" y="15" width="330" height="42" rx="10" fill="#059669"/>
  <rect x="755" y="45" width="330" height="12" fill="#059669"/>
  <text x="920" y="43" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">Gateway Pattern</text>

  <!-- App Pods -->
  <rect x="768" y="80" width="120" height="48" rx="5" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
  <text x="828" y="109" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">App Pod 1</text>

  <rect x="768" y="148" width="120" height="48" rx="5" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
  <text x="828" y="177" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">App Pod 2</text>

  <rect x="768" y="216" width="120" height="48" rx="5" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
  <text x="828" y="245" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">App Pod 3</text>

  <!-- OTel Gateway Collector -->
  <rect x="910" y="115" width="165" height="110" rx="5" fill="#1D4ED8"/>
  <text x="992" y="145" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">OTel Gateway</text>
  <text x="992" y="162" text-anchor="middle" font-size="11" fill="#BFDBFE">Collector</text>
  <text x="992" y="182" text-anchor="middle" font-size="10" fill="#7DD3FC">tail-sampling</text>
  <text x="992" y="198" text-anchor="middle" font-size="9" fill="#7DD3FC">30s trace buffer</text>
  <text x="992" y="214" text-anchor="middle" font-size="9" fill="#7DD3FC">in-memory</text>

  <!-- Arrows: Pods -> Gateway -->
  <line x1="888" y1="104" x2="909" y2="152" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="888" y1="172" x2="908" y2="172" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="888" y1="240" x2="909" y2="207" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Note box -->
  <rect x="768" y="350" width="305" height="75" rx="5" fill="#DCFCE7" stroke="none"/>
  <text x="920" y="373" text-anchor="middle" font-size="10" fill="#064E3B">Memory: fleet sizing + trace buffer</text>
  <text x="920" y="389" text-anchor="middle" font-size="10" fill="#064E3B">Blast radius: cluster-wide (gateway failure)</text>
  <text x="920" y="405" text-anchor="middle" font-size="10" fill="#064E3B">Tail sampling: SUPPORTED</text>
  <text x="920" y="421" text-anchor="middle" font-size="10" fill="#064E3B">Cross-service enrichment: SUPPORTED</text>

  <!-- Backend -->
  <rect x="830" y="450" width="185" height="60" rx="5" fill="#059669"/>
  <text x="922" y="478" text-anchor="middle" font-size="11" font-weight="bold" fill="#FFFFFF">Observability Backend</text>
  <text x="922" y="495" text-anchor="middle" font-size="10" fill="#D1FAE5">vendor / self-hosted</text>

  <path d="M 992 225 L 992 430 L 960 450" stroke="#4B5563" stroke-width="1.5" fill="none" marker-end="url(#arr)" stroke-dasharray="5,3"/>
</svg>
